    :root {
      --bg: #0a0a0f;
      --surface: #13131a;

      --border: #2a2a3a;
      --text: #e4e4ef;
      --text-muted: #8888a0;
      --accent: #6366f1;
      --accent-soft: rgba(99, 102, 241, 0.15);
      --green: #22c55e;
      --green-soft: rgba(34, 197, 94, 0.15);
      --orange: #f59e0b;
      --orange-soft: rgba(245, 158, 11, 0.15);
      --pink: #ec4899;
      --pink-soft: rgba(236, 72, 153, 0.15);
      --cyan: #06b6d4;
      --cyan-soft: rgba(6, 182, 212, 0.15);
      --blue: #3b82f6;
      --blue-soft: rgba(59, 130, 246, 0.15);
      --teal: #14b8a6;
      --teal-soft: rgba(20, 184, 166, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .header {
      padding: 3rem 2rem 2rem;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
    }

    .header p {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .controls {
      padding: 1.5rem 2rem;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .search {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 1rem;
      color: var(--text);
      font-size: 0.9rem;
      width: 280px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search:focus { border-color: var(--accent); }

    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.5rem 0.9rem;
      color: var(--text-muted);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1rem;
      padding: 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      transition: all 0.2s;
      cursor: default;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      border-color: var(--accent);
      background: var(--surface-hover);
      transform: translateY(-2px);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.75rem;
    }

    .card-name {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .card-date {
      font-size: 0.7rem;
      color: var(--text-muted);
      white-space: nowrap;
      margin-left: 0.5rem;
    }

    .card-desc {
      color: var(--text-muted);
      font-size: 0.85rem;
      line-height: 1.5;
      margin-bottom: 1rem;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 0.75rem;
    }

    .tag {
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-weight: 500;
    }

    .tag-lang { background: var(--accent-soft); color: var(--accent); }
    .tag-blockchain { background: var(--green-soft); color: var(--green); }
    .tag-ai { background: var(--pink-soft); color: var(--pink); }
    .tag-tool { background: var(--orange-soft); color: var(--orange); }
    .tag-meta { background: var(--cyan-soft); color: var(--cyan); }
    .tag-web { background: var(--blue-soft); color: var(--blue); }
    .tag-travel { background: var(--teal-soft); color: var(--teal); }

    .card-links {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .card-link {
      font-size: 0.75rem;
      color: var(--accent);
      text-decoration: none;
      padding: 0.2rem 0.5rem;
      border: 1px solid var(--accent);
      border-radius: 4px;
      transition: all 0.2s;
    }

    .card-link:hover {
      background: var(--accent-soft);
    }

    .card-link.live {
      color: var(--green);
      border-color: var(--green);
    }

    .card-link.live:hover {
      background: var(--green-soft);
    }

    .card-location {
      font-size: 0.7rem;
      color: var(--text-muted);
      opacity: 0.6;
    }

    .card-features {
      list-style: none;
      margin-bottom: 0.75rem;
    }

    .card-features li {
      font-size: 0.8rem;
      color: var(--text-muted);
      padding: 0.15rem 0;
    }

    .card-features li::before {
      content: "›";
      color: var(--accent);
      margin-right: 0.5rem;
      font-weight: 700;
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }

    .category-divider {
      grid-column: 1 / -1;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      padding: 1rem 0 0.25rem;
      border-bottom: 1px solid var(--border);
      margin-top: 0.5rem;
    }

    @media (max-width: 720px) {
      .grid { grid-template-columns: 1fr; padding: 1rem; }
      .header { padding: 2rem 1rem 1.5rem; }
      .controls { padding: 1rem; }
      .search { width: 100%; }
    }
  </style>
</head>

    const tagColors = {
      blockchain: "tag-blockchain",
      ai: "tag-ai",
      tool: "tag-tool",
      privacy: "tag-lang",
      meta: "tag-meta",
      web: "tag-web",
      travel: "tag-travel",
      game: "tag-lang"
    };

    const tagLabels = {
      blockchain: "Blockchain",
      ai: "AI",
      tool: "Tool",
      privacy: "ZKP/Privacy",
      meta: "Collection",
      web: "Web",
      travel: "Travel",
      game: "Game"
    };

    function renderCard(p) {
      const tagsHtml = p.tags.map(t =>
        `<span class="tag ${tagColors[t] || 'tag-lang'}">${tagLabels[t] || t}</span>`
      ).join("");
      const stackHtml = p.stack.map(s =>
        `<span class="tag tag-lang">${s}</span>`
      ).join("");
      const featuresHtml = p.features.map(f => `<li>${f}</li>`).join("");

      let linksHtml = "";
      if (p.url || p.report) {
        const parts = [];
        if (p.url) parts.push(`<a class="card-link live" href="${p.url}" target="_blank">Live</a>`);
        if (p.github) parts.push(`<a class="card-link" href="${p.github}" target="_blank">GitHub</a>`);
        if (p.report) parts.push(`<a class="card-link" href="${p.report}" target="_blank">Report</a>`);
        linksHtml = `<div class="card-links">${parts.join("")}</div>`;
      }

      return `
        <div class="card" data-tags="${p.tags.join(",")}" data-name="${p.name.toLowerCase()}" data-desc="${p.desc.toLowerCase()}">
          <div class="card-header">
            <span class="card-name">${p.name}</span>
            <span class="card-date">${p.date}</span>
          </div>
          <p class="card-desc">${p.desc}</p>
          <div class="card-tags">${tagsHtml} ${stackHtml}</div>
          <ul class="card-features">${featuresHtml}</ul>
          ${linksHtml}
          <span class="card-location">${p.location}</span>
        </div>
      `;
    }

    function render(filtered) {
      const grid = document.getElementById("grid");
      if (filtered.length === 0) {
        grid.innerHTML = '<div class="empty-state">No projects match your search.</div>';
        return;
      }

      const categories = [
        { label: "Blockchain", filter: p => p.tags.includes("blockchain") },
        { label: "AI / ML", filter: p => p.tags.includes("ai") && !p.tags.includes("blockchain") },
        { label: "Web Apps", filter: p => p.tags.includes("web") && !p.tags.includes("blockchain") && !p.tags.includes("ai") },
        { label: "Travel", filter: p => p.tags.includes("travel") && !p.tags.includes("web") },
        { label: "Tools & Infra", filter: p => p.tags.includes("tool") && !p.tags.includes("blockchain") && !p.tags.includes("ai") && !p.tags.includes("web") && !p.tags.includes("travel") },
        { label: "Privacy / Research", filter: p => p.tags.includes("privacy") && !p.tags.includes("blockchain") && !p.tags.includes("tool") },
        { label: "Games", filter: p => p.tags.includes("game") },
      ];
      const assigned = new Set();
      let html = "";
      for (const cat of categories) {
        const items = filtered.filter(p => !assigned.has(p.name) && cat.filter(p));
        items.forEach(p => assigned.add(p.name));
        if (items.length > 0) {
          html += `<div class="category-divider">${cat.label}</div>`;
          html += items.map(renderCard).join("");
        }
      }
      const remaining = filtered.filter(p => !assigned.has(p.name));
      if (remaining.length > 0) {
        html += '<div class="category-divider">Other</div>';
        html += remaining.map(renderCard).join("");
      }
      grid.innerHTML = html;
    }

    function updateStats(filtered) {
      document.getElementById("total-count").textContent = filtered.length;
      document.getElementById("blockchain-count").textContent = filtered.filter(p => p.tags.includes("blockchain")).length;
      document.getElementById("ai-count").textContent = filtered.filter(p => p.tags.includes("ai")).length;
      document.getElementById("tool-count").textContent = filtered.filter(p => p.tags.includes("tool")).length;
      document.getElementById("web-count").textContent = filtered.filter(p => p.tags.includes("web") || p.tags.includes("travel")).length;
      document.getElementById("deployed-count").textContent = filtered.filter(p => p.url).length;
    }

    let activeFilter = "all";

    function applyFilters() {
      const query = document.getElementById("search").value.toLowerCase();
      const filtered = projects.filter(p => {
        const matchesFilter = activeFilter === "all" || p.tags.includes(activeFilter);
        const matchesSearch = !query ||
          p.name.toLowerCase().includes(query) ||
          p.desc.toLowerCase().includes(query) ||
          p.stack.some(s => s.toLowerCase().includes(query));
        return matchesFilter && matchesSearch;
      });
      render(filtered);
      updateStats(filtered);
    }

    document.getElementById("search").addEventListener("input", applyFilters);

    document.querySelectorAll(".filter-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        activeFilter = btn.dataset.filter;
        applyFilters();
      });
    });

    // Initial render
    applyFilters();
  </script>
